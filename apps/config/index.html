<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeinUngeheuer Control</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    input, select, textarea, button {
      accent-color: #ffffff;
    }

    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --surface2: #141414;
      --border: #2a2a2a;
      --border2: #333333;
      --text: #e0e0e0;
      --text-muted: #777777;
      --accent: #ffffff;
      --accent-hover: #cccccc;
      --danger: #cc4444;
      --success: #66aa66;
      --warning: #ccaa44;
      --radius: 6px;
      --font: Helvetica, 'Helvetica Neue', Arial, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
      white-space: nowrap;
    }

    /* ── Mode bar ── */
    #mode-bar {
      display: flex;
      align-items: stretch;
      flex: 1;
      gap: 0;
      padding: 0 16px;
    }

    .mode-btn {
      padding: 6px 18px;
      background: transparent;
      color: var(--text-muted);
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
      white-space: nowrap;
    }

    .mode-btn:hover {
      color: var(--text);
    }

    .mode-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Header right ── */
    #header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #connection-status {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .conn-dot {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .conn-dot .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }

    .conn-dot .dot.connected { background: var(--success); }
    .conn-dot .dot.disconnected { background: var(--danger); }
    .conn-dot .dot.checking { background: var(--warning); }

    #system-btn {
      padding: 5px 12px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      transition: border-color 0.15s, color 0.15s;
    }

    #system-btn:hover,
    #system-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    #logout-btn {
      padding: 5px 14px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      transition: border-color 0.15s, color 0.15s;
    }

    #logout-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── Main content ── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #content::-webkit-scrollbar {
      width: 6px;
    }

    #content::-webkit-scrollbar-track {
      background: transparent;
    }

    #content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #login-overlay.hidden {
      display: none;
    }

    #login-box {
      width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 36px 32px;
    }

    #login-box h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    #login-box p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    #login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .login-field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .login-field input {
      padding: 9px 12px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }

    .login-field input:focus {
      border-color: var(--accent);
    }

    #login-submit {
      margin-top: 8px;
      padding: 10px;
      background: var(--accent);
      color: #000000;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s;
    }

    #login-submit:hover {
      background: var(--accent-hover);
    }

    #login-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #login-error {
      font-size: 13px;
      color: var(--danger);
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <h1>MeinUngeheuer Control</h1>

      <!-- Mode switcher -->
      <nav id="mode-bar">
        <button class="mode-btn active" data-mode="programs" type="button">Programs</button>
        <button class="mode-btn" data-mode="workbench" type="button">Workbench</button>
      </nav>

      <!-- Right side -->
      <div id="header-right">
        <div id="connection-status">
          <span class="conn-dot" id="dot-supabase">
            <span class="dot checking"></span>
            Supabase
          </span>
          <span class="conn-dot" id="dot-pos">
            <span class="dot checking"></span>
            POS
          </span>
          <span class="conn-dot" id="dot-renderer">
            <span class="dot checking"></span>
            Renderer
          </span>
        </div>
        <button id="system-btn" type="button">System</button>
        <button id="logout-btn" type="button">Logout</button>
      </div>
    </header>

    <!-- Main content -->
    <main id="content"></main>
  </div>

  <!-- Login overlay -->
  <div id="login-overlay">
    <div id="login-box">
      <h2>MeinUngeheuer Control</h2>
      <p>Sign in to manage the installation.</p>
      <form id="login-form" autocomplete="on">
        <div class="login-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" autocomplete="email" required />
        </div>
        <div class="login-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" autocomplete="current-password" required />
        </div>
        <div id="login-error"></div>
        <button type="submit" id="login-submit">Sign in</button>
      </form>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
